    <!-- MAIN SECTION -->

    <section class="min-vh-100 d-flex align-items-center text-center text-white d-flex flex-column justify-content-evenly"
        style="background: url('img/imag-main.png') center/cover no-repeat;">

        <div class=" container d-flex justify-content-center mb-2 " style="max-width: 300px;">
            <img class=" img-fluid opacity-50 border border-warning border-2 rounded-4"  src="img/Horário de Funcionamento.png" alt="" srcset="">
        </div>
        <h2 class="text-center border-bottom border-warning text-warning fs-1 mb-2 "> &#128198; Agende Seu Horário  &#128336;</h2>

        <div class="container border border-warning border-2 rounded-4 p-3 " style="max-width: 600px;">

            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label fs-3">Nome</label>
                <input type="text" class="form-control opacity-25" id="formGroupExampleInput"
                    placeholder="Digite seu Nome">
            </div>
            <div class="mb-3">
                <label for="formGroupExampleInput2" class="form-label fs-3">E-mail</label>
                <input type="email" class="form-control opacity-25 " id="formGroupExampleInput2"
                    placeholder="Digite seu E-mail">
            </div>

            <!-- checkbox -->
            <div class="container d-flex justify-content-evenly flex-column flex-sm-row mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkBarba">
                    <label class="form-check-label" for="checkBarba">
                        Barba
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkCorte" checked>
                    <label class="form-check-label" for="checkCorte">
                        Corte
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkPenteado" checked>
                    <label class="form-check-label" for="checkCorte">
                        Penteado
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkDesenho" checked>
                    <label class="form-check-label" for="checkDesenho">
                        Desenho
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkPintura" checked>
                    <label class="form-check-label" for="checkPintura">
                        Pintura
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="checkMassagem" checked>
                    <label class="form-check-label" for="checkMassagem">
                        Massagem
                    </label>
                </div>
            </div>
            <select class="form-select opacity-25 mb-3" aria-label="Default select example">
                <option selected>Selecione o Horário</option>
                <option value="1">8h</option>
                <option value="2">9h</option>
                <option value="3">10h</option>
                <option value="4">11h</option>
                <option value="5">13h</option>
                <option value="6">14h</option>
                <option value="7">15h</option>
                <option value="8">16h</option>
            </select>
            <select class="form-select opacity-25 mb-3" aria-label="Default select example">
                <option selected>Selecione o Dia</option>
                <option value="1">Segunda-Feira</option>
                <option value="2">Terça-Feira</option>
                <option value="3">Quarta-Feira</option>
                <option value="4">Quinta-Feira</option>
                <option value="5">Sexta-feira</option>
                <option value="6">Sabado</option>
            </select>

            <button type="button" class="fw-bold btn btn-lg btn-warning mb-3">Enviar</button>

        </div>
    </section>

    </section>
